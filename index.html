<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily's</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Daily's">
<meta name="theme-color" content="#000000">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23000'/><text x='50' y='44' text-anchor='middle' font-family='-apple-system,BlinkMacSystemFont,sans-serif' font-size='23' font-weight='800' fill='%23fff' letter-spacing='-0.5'>Daily&apos;s</text><line x1='20' y1='56' x2='80' y2='56' stroke='%23333' stroke-width='1.5'/><text x='50' y='72' text-anchor='middle' font-family='-apple-system,BlinkMacSystemFont,sans-serif' font-size='9' font-weight='600' fill='%23666' letter-spacing='2'>TO-DO</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #000;
  --s1: #0d0d0d;
  --s2: #1a1a1a;
  --s3: #252525;
  --border: #2a2a2a;
  --text: #fff;
  --muted: #555;
  --muted2: #888;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  overscroll-behavior: none;
}

/* ── HEADER ─────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 50;
  background: #000;
  padding: calc(env(safe-area-inset-top) + 14px) 20px 0;
  border-bottom: 1px solid var(--border);
}

.header-top {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 14px;
}

.app-title {
  font-size: 2rem; font-weight: 800;
  letter-spacing: -0.05em; line-height: 1;
}

.header-date { font-size: 0.78rem; color: var(--muted2); padding-bottom: 3px; }

/* VIEW SWITCHER */
.view-tabs {
  display: flex; gap: 0;
  border-top: 1px solid var(--border);
}
.view-tab {
  flex: 1; padding: 11px 4px; text-align: center;
  font-size: 0.8rem; font-weight: 600; color: var(--muted);
  cursor: pointer; background: none; border: none;
  border-bottom: 2px solid transparent; color: var(--muted);
  transition: all 0.15s; font-family: inherit;
  letter-spacing: 0.02em;
}
.view-tab.active { color: #fff; border-bottom-color: #fff; }

/* ── QUICK ACTIONS ───────────────────────────────────────────── */
.quick-strip {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.quick-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 12px 6px; border-radius: 14px;
  background: var(--s1); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.18s;
  font-family: inherit;
}
.quick-btn .qi { font-size: 1.5rem; line-height: 1; }
.quick-btn .ql {
  font-size: 0.6rem; font-weight: 700; color: var(--muted2);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.quick-btn.active {
  background: #fff; border-color: #fff;
}
.quick-btn.active .ql { color: #000; }

/* ── CONTAINER ───────────────────────────────────────────────── */
.container {
  max-width: 680px; margin: 0 auto;
  padding: 18px 20px calc(90px + env(safe-area-inset-bottom));
}

/* ── PROGRESS ────────────────────────────────────────────────── */
.progress-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.progress-lbl { font-size: 0.75rem; color: var(--muted2); }
.progress-pct { font-size: 0.75rem; font-weight: 700; color: var(--muted2); }
.progress-bar { height: 2px; background: var(--s2); border-radius: 99px; margin-bottom: 20px; }
.progress-fill { height: 100%; background: #fff; border-radius: 99px; transition: width 0.4s ease; }

/* ── SECTION LABEL ───────────────────────────────────────────── */
.sec-label {
  font-size: 0.68rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin: 22px 0 10px;
}

/* ── TASK CARD ───────────────────────────────────────────────── */
.task-list { display: flex; flex-direction: column; }

.task-card {
  display: flex; align-items: flex-start; gap: 13px;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
  transition: opacity 0.2s;
}
.task-card:last-child { border-bottom: none; }
.task-card.done { opacity: 0.3; }
.task-card.done .task-title { text-decoration: line-through; }

.cb {
  width: 21px; height: 21px; border-radius: 50%;
  border: 1.5px solid var(--border); flex-shrink: 0;
  cursor: pointer; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.cb:hover { border-color: #fff; }
.cb.checked { background: #fff; border-color: #fff; }
.cb.checked::after {
  content: '';
  width: 4px; height: 8px;
  border: 1.5px solid #000;
  border-top: none; border-left: none;
  transform: rotate(45deg) translate(-1px, -1px);
}

.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 0.92rem; font-weight: 500; line-height: 1.35; }
.task-meta { display: flex; align-items: center; gap: 7px; margin-top: 4px; flex-wrap: wrap; }
.task-time { font-size: 0.73rem; color: var(--muted2); }
.task-cat {
  font-size: 0.68rem; font-weight: 700;
  padding: 2px 8px; border-radius: 99px;
  letter-spacing: 0.02em;
}
.task-recur { font-size: 0.7rem; color: var(--muted); }
.task-overdue { font-size: 0.7rem; color: #ff4444; }

.task-actions { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
.task-card:hover .task-actions { opacity: 1; }
.btn-icon {
  background: none; border: none; color: var(--muted);
  cursor: pointer; padding: 4px 7px; border-radius: 7px;
  font-size: 0.82rem; transition: all 0.15s; font-family: inherit;
}
.btn-icon:hover { color: #fff; background: var(--s2); }
.btn-icon.del:hover { color: #ff4444; }

/* ── WEEK VIEW ───────────────────────────────────────────────── */
.week-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 6px; margin-bottom: 20px;
}
.week-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.week-header {
  display: flex; flex-direction: column; align-items: center;
  padding: 7px 4px; border-radius: 10px; cursor: pointer;
  transition: background 0.15s; width: 100%;
}
.week-header.today { background: #fff; }
.week-header.sel:not(.today) { background: var(--s2); }
.week-dname { font-size: 0.6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
.week-header.today .week-dname { color: #000; }
.week-dnum { font-size: 0.95rem; font-weight: 700; margin-top: 2px; }
.week-header.today .week-dnum { color: #000; }
.week-dots { display: flex; flex-direction: column; gap: 2px; width: 100%; padding: 0 3px; }
.week-dot { height: 4px; border-radius: 99px; width: 100%; }

/* ── MONTH VIEW ──────────────────────────────────────────────── */
.month-nav-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.month-nav-btn {
  background: none; border: none; color: #fff; font-size: 1.3rem;
  cursor: pointer; padding: 4px 12px; border-radius: 8px;
  transition: background 0.15s;
}
.month-nav-btn:hover { background: var(--s2); }
.month-title { font-size: 0.95rem; font-weight: 700; }

.month-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
}
.month-dname {
  text-align: center; font-size: 0.62rem; font-weight: 700;
  color: var(--muted); padding: 6px 0; text-transform: uppercase;
}
.month-day {
  aspect-ratio: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 8px; cursor: pointer; position: relative;
  font-size: 0.82rem; transition: background 0.12s;
}
.month-day:hover { background: var(--s1); }
.month-day.today { background: #fff; color: #000; font-weight: 700; }
.month-day.sel:not(.today) { background: var(--s2); }
.month-day.faded { color: var(--muted); }
.month-day.has-dot::after {
  content: ''; position: absolute; bottom: 4px;
  width: 4px; height: 4px; border-radius: 50%; background: #fff;
}
.month-day.today.has-dot::after { background: #000; }

/* ── EMPTY ───────────────────────────────────────────────────── */
.empty { padding: 40px 0; text-align: center; color: var(--muted); font-size: 0.88rem; }

/* ── FAB ─────────────────────────────────────────────────────── */
.fab {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom));
  right: 22px; z-index: 100;
  width: 52px; height: 52px;
  background: #fff; color: #000;
  border: none; border-radius: 50%;
  font-size: 1.5rem; font-weight: 300;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 2px 20px rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.fab:hover { transform: scale(1.07); }

/* ── MODAL ───────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 22px 22px 0 0;
  padding: 0 22px calc(28px + env(safe-area-inset-bottom));
  width: 100%; max-height: 93vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
}
.overlay.open .sheet { transform: translateY(0); }

.handle {
  width: 34px; height: 4px; background: var(--s3);
  border-radius: 99px; margin: 14px auto 20px;
}

.sheet h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 20px; }

/* FORM */
.fg { margin-bottom: 15px; }
.fl {
  display: block; font-size: 0.68rem; font-weight: 700;
  color: var(--muted2); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 7px;
}
input[type=text], input[type=time], input[type=date] {
  width: 100%; background: var(--s2); border: 1px solid var(--border);
  border-radius: 11px; color: #fff; font-size: 0.92rem;
  padding: 11px 13px; outline: none; font-family: inherit;
  -webkit-appearance: none; transition: border-color 0.15s;
}
input:focus { border-color: #444; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* WEEKDAY PICKER */
.day-row { display: flex; gap: 6px; }
.day-btn {
  flex: 1; height: 36px; border-radius: 8px;
  background: var(--s2); border: 1px solid var(--border);
  color: var(--muted2); font-size: 0.7rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
  text-transform: uppercase;
}
.day-btn.on { background: #fff; border-color: #fff; color: #000; }

/* CAT CHIPS */
.cat-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.cat-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 99px;
  border: 1px solid var(--border); background: transparent;
  color: #fff; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.cat-chip.on { border-color: #fff; background: var(--s2); }
.cc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* TOGGLE */
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.toggle {
  width: 44px; height: 26px; background: var(--s3);
  border-radius: 99px; border: none; cursor: pointer;
  position: relative; transition: background 0.2s; flex-shrink: 0;
}
.toggle.on { background: #fff; }
.toggle::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--muted); top: 3px; left: 3px;
  transition: transform 0.2s, background 0.2s;
}
.toggle.on::after { transform: translateX(18px); background: #000; }

/* SHEET ACTIONS */
.sheet-actions { display: flex; gap: 10px; margin-top: 22px; }
.btn-save {
  flex: 1; background: #fff; color: #000; border: none;
  border-radius: 11px; padding: 13px; font-size: 0.92rem;
  font-weight: 700; cursor: pointer; font-family: inherit;
  transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.88; }
.btn-cancel2 {
  background: var(--s2); color: var(--muted2); border: 1px solid var(--border);
  border-radius: 11px; padding: 13px 18px; font-size: 0.92rem;
  cursor: pointer; font-family: inherit; transition: color 0.15s;
}
.btn-cancel2:hover { color: #fff; }

/* CAT MANAGER SHEET */
.cat-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 0; border-bottom: 1px solid var(--border);
}
.cat-row:last-child { border-bottom: none; }
.cat-cdot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.cat-cname { flex: 1; font-size: 0.9rem; }
.cat-del-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 1rem; padding: 2px 6px; border-radius: 6px; transition: color 0.15s;
}
.cat-del-btn:hover { color: #ff4444; }

.new-cat-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
.new-cat-row input[type=text] { flex: 1; }
.color-pick {
  width: 44px; height: 44px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--s2);
  cursor: pointer; padding: 3px; overflow: hidden; flex-shrink: 0;
}
input[type=color] {
  width: 100%; height: 100%; border: none; background: none;
  cursor: pointer; padding: 0;
}

/* ── NUTRITION ───────────────────────────────────────────────── */
.nut-section {
  margin-top: 28px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}
.nut-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.nut-header-left { display: flex; align-items: center; gap: 10px; }
.nut-title { font-size: 0.92rem; font-weight: 700; }
.nut-goal-btn {
  font-size: 0.68rem; color: var(--muted); background: none; border: none;
  cursor: pointer; font-family: inherit; padding: 2px 6px;
  border-radius: 6px; transition: color 0.15s;
}
.nut-goal-btn:hover { color: #fff; }
.nut-add-btn {
  background: var(--s2); border: 1px solid var(--border);
  color: #fff; border-radius: 8px; padding: 5px 12px;
  font-size: 0.78rem; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.nut-add-btn:hover { border-color: #555; }

.macro-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 16px;
}
.macro-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
}
.macro-card.full-width { grid-column: 1 / -1; }
.macro-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.macro-name { font-size: 0.7rem; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.06em; }
.macro-vals { font-size: 0.72rem; color: var(--muted); }
.macro-vals strong { color: #fff; font-size: 0.85rem; }
.macro-bar { height: 3px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.macro-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
.macro-over { color: #ff6b6b !important; }

.meal-list { display: flex; flex-direction: column; gap: 1px; }
.meal-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.meal-row:last-child { border-bottom: none; }
.meal-info { flex: 1; min-width: 0; }
.meal-name { font-size: 0.88rem; font-weight: 500; }
.meal-macros { font-size: 0.72rem; color: var(--muted2); margin-top: 2px; }
.meal-kcal { font-size: 0.82rem; font-weight: 700; color: #fff; flex-shrink: 0; }
.meal-del {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 0.82rem; padding: 3px 6px; border-radius: 5px;
  transition: color 0.15s; opacity: 0;
}
.meal-row:hover .meal-del { opacity: 1; }
.meal-del:hover { color: #ff4444; }
.meal-fav {
  background: none; border: none; cursor: pointer;
  font-size: 1rem; padding: 3px 6px; border-radius: 5px;
  transition: all 0.15s; opacity: 0; line-height: 1;
}
.meal-row:hover .meal-fav { opacity: 1; }
.meal-fav.active { opacity: 1; }

/* FAVORITES */
.fav-section { margin-bottom: 18px; }
.fav-label { font-size: 0.68rem; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.fav-list { display: flex; flex-direction: column; gap: 6px; }
.fav-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 11px; padding: 10px 13px; cursor: pointer;
  transition: border-color 0.15s;
}
.fav-item:hover { border-color: #555; }
.fav-item-info { flex: 1; min-width: 0; }
.fav-item-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fav-item-macros { font-size: 0.7rem; color: var(--muted2); margin-top: 2px; }
.fav-item-kcal { font-size: 0.82rem; font-weight: 700; flex-shrink: 0; }
.fav-del-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 0.78rem; padding: 3px 6px; border-radius: 5px; transition: color 0.15s;
}
.fav-del-btn:hover { color: #ff4444; }

.nut-empty { font-size: 0.82rem; color: var(--muted); padding: 10px 0; }

/* macro colors */
.mc-kcal  { background: #fff; }
.mc-prot  { background: #4fc3f7; }
.mc-carb  { background: #81c784; }
.mc-fat   { background: #ffb74d; }

/* ── CELEBRATION ─────────────────────────────────────────────── */
#celebrationCanvas {
  position: fixed; inset: 0; z-index: 999;
  pointer-events: none;
}
.celebrate-msg {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  z-index: 1000; text-align: center;
  pointer-events: none;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.celebrate-msg.show { transform: translate(-50%, -50%) scale(1); }
.celebrate-msg .big { font-size: 3.5rem; display: block; margin-bottom: 8px; }
.celebrate-msg .txt { font-size: 1rem; font-weight: 700; color: #fff; }

/* ── SCANNER ─────────────────────────────────────────────────── */
.scan-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: #000;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
.scan-overlay.open { opacity: 1; pointer-events: all; }

.scan-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(env(safe-area-inset-top) + 16px) 20px 16px;
  flex-shrink: 0;
}
.scan-header h3 { font-size: 1rem; font-weight: 700; }
.scan-close {
  background: var(--s2); border: none; color: #fff;
  border-radius: 50%; width: 32px; height: 32px;
  font-size: 1rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}

#scanView { flex: 1; position: relative; overflow: hidden; }
#scanView video { width: 100%; height: 100%; object-fit: cover; }

.scan-frame {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.scan-box {
  width: 240px; height: 150px;
  border: 2px solid #fff; border-radius: 14px;
  box-shadow: 0 0 0 2000px rgba(0,0,0,0.55);
  position: relative;
}
.scan-line {
  position: absolute; left: 0; right: 0; top: 50%;
  height: 2px; background: #fff; opacity: 0.7;
  animation: scanAnim 1.8s ease-in-out infinite;
}
@keyframes scanAnim {
  0%, 100% { top: 20%; opacity: 0.4; }
  50% { top: 80%; opacity: 1; }
}
.scan-hint {
  position: absolute; bottom: 0; left: 0; right: 0;
  text-align: center; padding: 20px;
  font-size: 0.82rem; color: rgba(255,255,255,0.6);
  flex-shrink: 0;
}

/* PRODUCT CONFIRM */
.prod-confirm {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.prod-confirm.open { opacity: 1; pointer-events: all; }
.prod-sheet {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 22px 22px 0 0;
  padding: 0 22px calc(28px + env(safe-area-inset-bottom));
  width: 100%;
}
.prod-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
.prod-per100 { font-size: 0.78rem; color: var(--muted2); margin-bottom: 18px; }
.prod-macros-preview {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; margin-bottom: 20px;
}
.pmp { text-align: center; }
.pmp-val { font-size: 1rem; font-weight: 700; }
.pmp-lbl { font-size: 0.62rem; color: var(--muted2); text-transform: uppercase; margin-top: 2px; }
.gram-row { display: flex; gap: 10px; align-items: flex-end; }
.gram-row .fg { flex: 1; margin-bottom: 0; }

/* number input */
input[type=number] {
  width: 100%; background: var(--s2); border: 1px solid var(--border);
  border-radius: 11px; color: #fff; font-size: 0.92rem;
  padding: 11px 13px; outline: none; font-family: inherit;
  -webkit-appearance: none; transition: border-color 0.15s;
}
input[type=number]:focus { border-color: #444; }

/* NOTIF BANNER */
.notif-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 14px; margin-bottom: 16px;
}
.notif-bar p { flex: 1; font-size: 0.8rem; color: var(--muted2); }
.notif-bar button {
  background: #fff; color: #000; border: none;
  border-radius: 8px; padding: 6px 14px;
  font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <span class="app-title">Daily's</span>
    <span class="header-date" id="hDate"></span>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" onclick="setView('day',this)">Tag</button>
    <button class="view-tab" onclick="setView('week',this)">Woche</button>
    <button class="view-tab" onclick="setView('month',this)">Monat</button>
  </div>
</header>

<!-- QUICK ACTIONS -->
<div class="quick-strip" id="quickStrip"></div>

<!-- MAIN -->
<div class="container">
  <div id="notifBar" style="display:none">
    <div class="notif-bar">
      <p>🔔 Mitteilungen aktivieren für Erinnerungen</p>
      <button onclick="askNotif()">Aktivieren</button>
    </div>
  </div>
  <div id="progressWrap">
    <div class="progress-row">
      <span class="progress-lbl" id="pLbl"></span>
      <span class="progress-pct" id="pPct"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
  </div>
  <div id="main"></div>
</div>

<button class="fab" onclick="openTask()">+</button>

<!-- TASK SHEET -->
<div class="overlay" id="taskSheet" onclick="bgClose(event,'taskSheet')">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="taskSheetTitle">Neue Aufgabe</h2>

    <div class="fg">
      <label class="fl">Aufgabe</label>
      <input type="text" id="iTitle" placeholder="Was musst du tun?" />
    </div>
    <div class="frow">
      <div class="fg">
        <label class="fl">Von</label>
        <input type="time" id="iTimeFrom" />
      </div>
      <div class="fg">
        <label class="fl">Bis</label>
        <input type="time" id="iTimeTo" />
      </div>
    </div>
    <div class="fg">
      <label class="fl">Datum</label>
      <input type="date" id="iDate" />
    </div>
    <div class="fg">
      <label class="fl">Kategorie &nbsp;<span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0" onclick="openCats()" style="cursor:pointer">— Verwalten</span></label>
      <div class="cat-chips" id="catChips"></div>
    </div>
    <div class="fg">
      <label class="fl">Wiederholen an</label>
      <div class="day-row" id="dayRow">
        <button class="day-btn" data-d="1" onclick="toggleDay(this)">Mo</button>
        <button class="day-btn" data-d="2" onclick="toggleDay(this)">Di</button>
        <button class="day-btn" data-d="3" onclick="toggleDay(this)">Mi</button>
        <button class="day-btn" data-d="4" onclick="toggleDay(this)">Do</button>
        <button class="day-btn" data-d="5" onclick="toggleDay(this)">Fr</button>
        <button class="day-btn" data-d="6" onclick="toggleDay(this)">Sa</button>
        <button class="day-btn" data-d="0" onclick="toggleDay(this)">So</button>
      </div>
    </div>
    <div class="fg">
      <div class="toggle-row">
        <label class="fl" style="margin:0">🔔 Erinnerung senden</label>
        <button class="toggle" id="notifToggle" onclick="this.classList.toggle('on')"></button>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel2" onclick="closeSheet('taskSheet')">Abbrechen</button>
      <button class="btn-save" onclick="saveTask()">Speichern</button>
    </div>
  </div>
</div>

<canvas id="celebrationCanvas"></canvas>
<div class="celebrate-msg" id="celebrateMsg">
  <span class="big">🎉</span>
  <span class="txt">Alles erledigt!</span>
</div>

<!-- SCAN OVERLAY -->
<div class="scan-overlay" id="scanOverlay">
  <div class="scan-header">
    <h3>Barcode scannen</h3>
    <button class="scan-close" onclick="closeScanner()">✕</button>
  </div>
  <div id="scanView"></div>
  <div class="scan-frame"><div class="scan-box"><div class="scan-line"></div></div></div>
  <div class="scan-hint">Barcode in den Rahmen halten</div>
</div>

<!-- PRODUCT CONFIRM -->
<div class="prod-confirm" id="prodConfirm">
  <div class="prod-sheet">
    <div class="handle"></div>
    <div class="prod-name" id="prodName"></div>
    <div class="prod-per100" id="prodPer100"></div>
    <div class="prod-macros-preview" id="prodPreview"></div>
    <div class="gram-row">
      <div class="fg">
        <label class="fl">Menge (g)</label>
        <input type="number" id="gramInput" placeholder="100" min="1" />
      </div>
      <button class="btn-save" style="flex:1;padding:11px" onclick="confirmProduct()">Hinzufügen</button>
    </div>
    <div style="margin-top:10px">
      <button class="btn-cancel2" style="width:100%;text-align:center" onclick="cancelProduct()">Abbrechen</button>
    </div>
  </div>
</div>

<!-- MEAL SHEET -->
<div class="overlay" id="mealSheet" onclick="bgClose(event,'mealSheet')">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="mealSheetTitle">Mahlzeit hinzufügen</h2>
    <div class="fav-section" id="favSection"></div>
    <button onclick="startScanner()" style="width:100%;background:var(--s2);border:1px solid var(--border);color:#fff;border-radius:11px;padding:12px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px">
      <span>📷</span> Barcode scannen
    </button>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:0.72rem;color:var(--muted)">oder manuell</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>
    <div class="fg">
      <label class="fl">Name</label>
      <input type="text" id="mName" placeholder="z.B. Haferflocken mit Milch" />
    </div>
    <div class="frow">
      <div class="fg">
        <label class="fl">Kalorien (kcal)</label>
        <input type="number" id="mKcal" placeholder="0" min="0" />
      </div>
      <div class="fg">
        <label class="fl">Protein (g)</label>
        <input type="number" id="mProt" placeholder="0" min="0" step="0.1" />
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="fl">Kohlenhydrate (g)</label>
        <input type="number" id="mCarb" placeholder="0" min="0" step="0.1" />
      </div>
      <div class="fg">
        <label class="fl">Fett (g)</label>
        <input type="number" id="mFat" placeholder="0" min="0" step="0.1" />
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel2" onclick="closeSheet('mealSheet')">Abbrechen</button>
      <button class="btn-save" onclick="saveMeal()">Speichern</button>
    </div>
  </div>
</div>

<!-- GOALS SHEET -->
<div class="overlay" id="goalSheet" onclick="bgClose(event,'goalSheet')">
  <div class="sheet">
    <div class="handle"></div>
    <h2>Tagesziele</h2>
    <div class="frow">
      <div class="fg">
        <label class="fl">Kalorien (kcal)</label>
        <input type="number" id="gKcal" placeholder="2000" min="0" />
      </div>
      <div class="fg">
        <label class="fl">Protein (g)</label>
        <input type="number" id="gProt" placeholder="150" min="0" />
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="fl">Kohlenhydrate (g)</label>
        <input type="number" id="gCarb" placeholder="250" min="0" />
      </div>
      <div class="fg">
        <label class="fl">Fett (g)</label>
        <input type="number" id="gFat" placeholder="65" min="0" />
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel2" onclick="closeSheet('goalSheet')">Abbrechen</button>
      <button class="btn-save" onclick="saveGoals()">Speichern</button>
    </div>
  </div>
</div>

<!-- CAT SHEET -->
<div class="overlay" id="catSheet" onclick="bgClose(event,'catSheet')">
  <div class="sheet">
    <div class="handle"></div>
    <h2>Kategorien</h2>
    <div id="catList"></div>
    <div class="new-cat-row">
      <input type="text" id="newCatName" placeholder="Neue Kategorie..." />
      <div class="color-pick"><input type="color" id="newCatColor" value="#ffffff" /></div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel2" onclick="closeSheet('catSheet')">Fertig</button>
      <button class="btn-save" onclick="addCat()">Hinzufügen</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('dalys2_tasks') || '[]');
let cats = JSON.parse(localStorage.getItem('dalys2_cats') || JSON.stringify([
  { id:'c1', name:'Arbeit',     color:'#ffffff' },
  { id:'c2', name:'Privat',     color:'#aaaaaa' },
  { id:'c3', name:'Gesundheit', color:'#888888' },
  { id:'c4', name:'Sport',      color:'#666666' },
]));
let quick = JSON.parse(localStorage.getItem('dalys2_quick') || '{}');

const save = () => localStorage.setItem('dalys2_tasks', JSON.stringify(tasks));
const saveCats = () => localStorage.setItem('dalys2_cats', JSON.stringify(cats));
const saveQuick = () => localStorage.setItem('dalys2_quick', JSON.stringify(quick));

// ─── STATE ────────────────────────────────────────────────────────────────────
let view = 'day';
let selDate = todayStr();
let viewMonth = new Date();
let editId = null;
let selCatId = null;
let selDays = [];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function taskOnDate(t, ds) {
  if (t.repeatDays && t.repeatDays.length) {
    const dow = new Date(ds + 'T12:00:00').getDay();
    return t.repeatDays.includes(dow);
  }
  return t.date === ds;
}

function isDone(t, ds) {
  if (t.repeatDays && t.repeatDays.length) return (t.doneDates||[]).includes(ds);
  return !!t.done;
}

function tasksFor(ds) {
  return tasks
    .filter(t => taskOnDate(t, ds))
    .sort((a,b) => (a.timeFrom||'99:99').localeCompare(b.timeFrom||'99:99'));
}

function nowHHMM() { return new Date().toTimeString().slice(0,5); }

// ─── HEADER DATE ─────────────────────────────────────────────────────────────
const DAYS = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const MONTHS_LONG = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONTHS_SHORT = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function updateHeaderDate() {
  const d = new Date();
  document.getElementById('hDate').textContent =
    DAYS[d.getDay()] + ', ' + d.getDate() + '. ' + MONTHS_SHORT[d.getMonth()];
}
updateHeaderDate();
setInterval(updateHeaderDate, 60000);

// ─── QUICK STRIP ─────────────────────────────────────────────────────────────
const QUICKS = [
  { id:'sk_am', icon:'☀️', label:'Skincare' },
  { id:'te_am', icon:'🦷', label:'Teeth' },
  { id:'bt_am', icon:'☀️', label:'Pray' },
  { id:'sk_pm', icon:'🌙', label:'Skincare' },
  { id:'te_pm', icon:'🦷', label:'Teeth' },
  { id:'bt_pm', icon:'🌙', label:'Pray' },
];

function renderQuick() {
  const today = todayStr();
  document.getElementById('quickStrip').innerHTML = QUICKS.map(q => {
    const k = q.id + '_' + today;
    const on = !!quick[k];
    return `<button class="quick-btn ${on?'active':''}" onclick="tapQuick('${q.id}')">
      <span class="qi">${q.icon}</span>
      <span class="ql">${esc(q.label)}</span>
    </button>`;
  }).join('');
}

function tapQuick(id) {
  const k = id + '_' + todayStr();
  quick[k] = !quick[k];
  saveQuick(); renderQuick();
}

// ─── VIEW SWITCH ─────────────────────────────────────────────────────────────
function setView(v, el) {
  view = v;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
let lastAllDone = false;
function renderProgress() {
  const all = tasksFor(todayStr());
  const done = all.filter(t => isDone(t, todayStr())).length;
  const total = all.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pLbl').textContent = `${done} von ${total} heute erledigt`;
  document.getElementById('pPct').textContent = pct + '%';
  document.getElementById('pFill').style.width = pct + '%';

  const allDone = total > 0 && done === total;
  if (allDone && !lastAllDone) celebrate();
  lastAllDone = allDone;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  renderQuick();
  renderProgress();
  const el = document.getElementById('main');
  if (view === 'day')   el.innerHTML = renderDay(selDate);
  else if (view === 'week')  el.innerHTML = renderWeek();
  else                  el.innerHTML = renderMonth();
}

// ─── DAY VIEW ────────────────────────────────────────────────────────────────
function renderDay(ds) {
  const list = tasksFor(ds);
  let html = '';
  if (!list.length) html += '<div class="empty">Keine Aufgaben — alles frei ✓</div>';
  else html += '<div class="task-list">' + list.map(t => taskCard(t, ds)).join('') + '</div>';
  html += renderNutrition(ds);
  return html;
}

function taskCard(t, ds) {
  const done = isDone(t, ds);
  const cat = cats.find(c => c.id === t.catId);
  const now = nowHHMM();
  const overdue = t.timeFrom && t.timeFrom < now && !done;
  const recurLabel = t.repeatDays && t.repeatDays.length
    ? '↺ ' + t.repeatDays.map(d => DAYS[d]).join(' ')
    : '';
  const timeLabel = t.timeFrom && t.timeTo
    ? `${t.timeFrom} – ${t.timeTo} Uhr`
    : t.timeFrom ? `${t.timeFrom} Uhr` : '';

  return `<div class="task-card ${done?'done':''}">
    <div class="cb ${done?'checked':''}" onclick="toggleTask('${t.id}','${ds}')"></div>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-meta">
        ${timeLabel ? `<span class="task-time">${timeLabel}</span>` : ''}
        ${cat ? `<span class="task-cat" style="background:${cat.color}18;color:${cat.color};border:1px solid ${cat.color}35">${esc(cat.name)}</span>` : ''}
        ${recurLabel ? `<span class="task-recur">${esc(recurLabel)}</span>` : ''}
        ${overdue ? `<span class="task-overdue">Überfällig</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <button class="btn-icon" onclick="openTask('${t.id}')">✏</button>
      <button class="btn-icon del" onclick="delTask('${t.id}')">✕</button>
    </div>
  </div>`;
}

// ─── WEEK VIEW ────────────────────────────────────────────────────────────────
function renderWeek() {
  // Mon-Sun of current week
  const today = new Date();
  const dow = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const mon = new Date(today); mon.setDate(today.getDate() - dow);

  const cols = Array.from({length:7}, (_,i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    return d;
  });

  let html = '<div class="week-grid">';
  cols.forEach((d, i) => {
    const ds = d.toISOString().slice(0,10);
    const isToday = ds === todayStr();
    const isSel = ds === selDate;
    const list = tasksFor(ds);
    const dnames = ['Mo','Di','Mi','Do','Fr','Sa','So'];

    html += `<div class="week-col">
      <div class="week-header ${isToday?'today':''} ${isSel&&!isToday?'sel':''}" onclick="selDay('${ds}')">
        <span class="week-dname">${dnames[i]}</span>
        <span class="week-dnum">${d.getDate()}</span>
      </div>
      <div class="week-dots">
        ${list.slice(0,5).map(t => {
          const cat = cats.find(c => c.id === t.catId);
          const col = cat ? cat.color : '#444';
          const done = isDone(t, ds);
          return `<div class="week-dot" style="background:${done?'#2a2a2a':col}" title="${esc(t.title)}"></div>`;
        }).join('')}
      </div>
    </div>`;
  });
  html += '</div>';

  // Selected day tasks below
  const list = tasksFor(selDate);
  const sd = new Date(selDate + 'T12:00:00');
  html += `<div class="sec-label">${sd.getDate()}. ${MONTHS_SHORT[sd.getMonth()]} — ${DAYS[sd.getDay()]}</div>`;
  if (list.length) {
    html += '<div class="task-list">' + list.map(t => taskCard(t, selDate)).join('') + '</div>';
  } else {
    html += '<div class="empty">Keine Aufgaben</div>';
  }
  return html;
}

function selDay(ds) { selDate = ds; render(); }

// ─── MONTH VIEW ───────────────────────────────────────────────────────────────
function renderMonth() {
  const yr = viewMonth.getFullYear();
  const mo = viewMonth.getMonth();
  const first = new Date(yr, mo, 1);
  const last = new Date(yr, mo+1, 0);
  const startDow = first.getDay() === 0 ? 6 : first.getDay() - 1;

  let html = `<div class="month-nav-row">
    <button class="month-nav-btn" onclick="shiftMonth(-1)">‹</button>
    <span class="month-title">${MONTHS_LONG[mo]} ${yr}</span>
    <button class="month-nav-btn" onclick="shiftMonth(1)">›</button>
  </div>
  <div class="month-grid">
    <div class="month-dname">Mo</div><div class="month-dname">Di</div>
    <div class="month-dname">Mi</div><div class="month-dname">Do</div>
    <div class="month-dname">Fr</div><div class="month-dname">Sa</div>
    <div class="month-dname">So</div>`;

  for (let i = 0; i < startDow; i++) html += '<div></div>';

  for (let day = 1; day <= last.getDate(); day++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = ds === todayStr();
    const isSel = ds === selDate;
    const hasDot = tasksFor(ds).length > 0;
    html += `<div class="month-day ${isToday?'today':''} ${isSel&&!isToday?'sel':''} ${hasDot?'has-dot':''}"
      onclick="selDay('${ds}')">${day}</div>`;
  }
  html += '</div>';

  // Selected day tasks
  const list = tasksFor(selDate);
  const sd = new Date(selDate + 'T12:00:00');
  html += `<div class="sec-label">${sd.getDate()}. ${MONTHS_SHORT[sd.getMonth()]}</div>`;
  if (list.length) {
    html += '<div class="task-list">' + list.map(t => taskCard(t, selDate)).join('') + '</div>';
  } else {
    html += '<div class="empty">Keine Aufgaben</div>';
  }
  return html;
}

function shiftMonth(dir) {
  viewMonth.setMonth(viewMonth.getMonth() + dir);
  render();
}

// ─── TASK ACTIONS ─────────────────────────────────────────────────────────────
function toggleTask(id, ds) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  if (t.repeatDays && t.repeatDays.length) {
    if (!t.doneDates) t.doneDates = [];
    const idx = t.doneDates.indexOf(ds);
    idx >= 0 ? t.doneDates.splice(idx,1) : t.doneDates.push(ds);
  } else {
    t.done = !t.done;
  }
  save(); render();
}

function delTask(id) {
  if (!confirm('Aufgabe löschen?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

// ─── TASK MODAL ───────────────────────────────────────────────────────────────
function openTask(id = null) {
  const t = id ? tasks.find(x => x.id === id) : null;
  editId = id;
  document.getElementById('taskSheetTitle').textContent = t ? 'Bearbeiten' : 'Neue Aufgabe';
  document.getElementById('iTitle').value = t ? t.title : '';
  document.getElementById('iTimeFrom').value = t ? (t.timeFrom || '') : '';
  document.getElementById('iTimeTo').value = t ? (t.timeTo || '') : '';
  document.getElementById('iDate').value = t ? (t.date || selDate) : selDate;
  selCatId = t ? (t.catId || null) : null;
  selDays = t ? (t.repeatDays ? [...t.repeatDays] : []) : [];

  document.getElementById('notifToggle').classList.toggle('on', !!(t && t.notify));
  document.querySelectorAll('.day-btn').forEach(b => {
    b.classList.toggle('on', selDays.includes(Number(b.dataset.d)));
  });

  renderCatChips();
  document.getElementById('taskSheet').classList.add('open');
  setTimeout(() => document.getElementById('iTitle').focus(), 280);
}

function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

function toggleDay(btn) {
  const d = Number(btn.dataset.d);
  const idx = selDays.indexOf(d);
  idx >= 0 ? selDays.splice(idx,1) : selDays.push(d);
  btn.classList.toggle('on', selDays.includes(d));
}

function renderCatChips() {
  document.getElementById('catChips').innerHTML =
    cats.map(c =>
      `<button class="cat-chip ${selCatId===c.id?'on':''}" onclick="pickCat('${c.id}',this)">
        <span class="cc-dot" style="background:${c.color}"></span>${esc(c.name)}
      </button>`
    ).join('') +
    `<button class="cat-chip" onclick="openCats()" style="color:var(--muted)">＋ Verwalten</button>`;
}

function pickCat(id, el) {
  if (el.style.color) return; // manage btn
  selCatId = selCatId === id ? null : id;
  renderCatChips();
}

function saveTask() {
  const title = document.getElementById('iTitle').value.trim();
  if (!title) { document.getElementById('iTitle').focus(); return; }

  const timeFrom = document.getElementById('iTimeFrom').value;
  const timeTo   = document.getElementById('iTimeTo').value;
  const date     = document.getElementById('iDate').value || selDate;
  const notify   = document.getElementById('notifToggle').classList.contains('on');

  const data = {
    id: editId || uid(),
    title, timeFrom, timeTo, date,
    catId: selCatId,
    repeatDays: [...selDays],
    notify,
    done: false,
    doneDates: [],
  };

  if (editId) {
    const idx = tasks.findIndex(t => t.id === editId);
    data.done = tasks[idx].done;
    data.doneDates = tasks[idx].doneDates || [];
    tasks[idx] = data;
  } else {
    tasks.push(data);
  }

  save();
  if (notify && timeFrom && date) scheduleNotif(title, timeFrom, date);
  closeSheet('taskSheet');
  render();
}

document.getElementById('iTitle').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveTask();
});

// ─── CATEGORIES ───────────────────────────────────────────────────────────────
function openCats() {
  renderCatList();
  document.getElementById('catSheet').classList.add('open');
}

function renderCatList() {
  document.getElementById('catList').innerHTML =
    cats.length
      ? cats.map(c =>
          `<div class="cat-row">
            <span class="cat-cdot" style="background:${c.color}"></span>
            <span class="cat-cname">${esc(c.name)}</span>
            <button class="cat-del-btn" onclick="delCat('${c.id}')">✕</button>
          </div>`
        ).join('')
      : '<div style="color:var(--muted);font-size:.85rem;padding:10px 0">Noch keine Kategorien</div>';
}

function addCat() {
  const name = document.getElementById('newCatName').value.trim();
  const color = document.getElementById('newCatColor').value;
  if (!name) return;
  cats.push({ id: uid(), name, color });
  saveCats();
  document.getElementById('newCatName').value = '';
  renderCatList();
  renderCatChips();
}

function delCat(id) {
  cats = cats.filter(c => c.id !== id);
  saveCats();
  if (selCatId === id) selCatId = null;
  renderCatList();
  renderCatChips();
}

document.getElementById('newCatName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCat();
});

// ─── NUTRITION DATA ───────────────────────────────────────────────────────────
let meals = JSON.parse(localStorage.getItem('dalys2_meals') || '{}');
let nutGoals = JSON.parse(localStorage.getItem('dalys2_goals') || JSON.stringify({
  kcal: 2000, prot: 150, carb: 250, fat: 65
}));
const saveMeals = () => localStorage.setItem('dalys2_meals', JSON.stringify(meals));
const saveGoalsData = () => localStorage.setItem('dalys2_goals', JSON.stringify(nutGoals));

function mealsForDay(ds) { return meals[ds] || []; }

function dayTotals(ds) {
  return mealsForDay(ds).reduce((acc, m) => ({
    kcal: acc.kcal + (m.kcal||0),
    prot: acc.prot + (m.prot||0),
    carb: acc.carb + (m.carb||0),
    fat:  acc.fat  + (m.fat||0),
  }), { kcal:0, prot:0, carb:0, fat:0 });
}

function pct(val, goal) {
  if (!goal) return 0;
  return Math.min(Math.round(val / goal * 100), 100);
}

function renderNutrition(ds) {
  const tot = dayTotals(ds);
  const g = nutGoals;
  const mList = mealsForDay(ds);

  const macroCard = (name, val, goal, cls, unit='g') => {
    const p = pct(val, goal);
    const over = goal && val > goal;
    return `<div class="macro-card">
      <div class="macro-top">
        <span class="macro-name">${name}</span>
        <span class="macro-vals ${over?'macro-over':''}"><strong>${Math.round(val)}</strong> / ${goal} ${unit}</span>
      </div>
      <div class="macro-bar"><div class="macro-fill ${cls}" style="width:${p}%"></div></div>
    </div>`;
  };

  let html = `<div class="nut-section">
    <div class="nut-header">
      <div class="nut-header-left">
        <span class="nut-title">Ernährung</span>
        <button class="nut-goal-btn" onclick="openGoals()">Ziele ›</button>
      </div>
      <button class="nut-add-btn" onclick="openMeal('${ds}')">+ Mahlzeit</button>
    </div>
    <div class="macro-grid">
      ${macroCard('Kalorien', tot.kcal, g.kcal, 'mc-kcal', 'kcal')}
      ${macroCard('Protein',  tot.prot, g.prot, 'mc-prot')}
      ${macroCard('Kohlenhydrate', tot.carb, g.carb, 'mc-carb')}
      ${macroCard('Fett',    tot.fat,  g.fat,  'mc-fat')}
    </div>`;

  if (mList.length) {
    html += '<div class="meal-list">' + mList.map((m,i) => {
      const favd = isFav(m);
      return `<div class="meal-row">
        <div class="meal-info">
          <div class="meal-name">${esc(m.name)}</div>
          <div class="meal-macros">P ${m.prot||0}g · K ${m.carb||0}g · F ${m.fat||0}g</div>
        </div>
        <span class="meal-kcal">${m.kcal||0} kcal</span>
        <button class="meal-fav ${favd?'active':''}" onclick="toggleFav(${JSON.stringify(JSON.stringify(m))})" title="${favd?'Aus Favoriten entfernen':'Als Favorit speichern'}">${favd?'★':'☆'}</button>
        <button class="meal-del" onclick="delMeal('${ds}',${i})">✕</button>
      </div>`;
    }).join('') + '</div>';
  } else {
    html += '<div class="nut-empty">Noch keine Mahlzeiten eingetragen</div>';
  }

  html += '</div>';
  return html;
}

// ─── MEAL MODAL ───────────────────────────────────────────────────────────────
let mealDate = null;

function openMeal(ds) {
  mealDate = ds;
  document.getElementById('mealSheetTitle').textContent = 'Mahlzeit hinzufügen';
  ['mName','mKcal','mProt','mCarb','mFat'].forEach(id => document.getElementById(id).value = '');
  renderFavSection();
  document.getElementById('mealSheet').classList.add('open');
  setTimeout(() => document.getElementById('mName').focus(), 280);
}

function saveMeal() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { document.getElementById('mName').focus(); return; }
  const entry = {
    name,
    kcal: parseFloat(document.getElementById('mKcal').value) || 0,
    prot: parseFloat(document.getElementById('mProt').value) || 0,
    carb: parseFloat(document.getElementById('mCarb').value) || 0,
    fat:  parseFloat(document.getElementById('mFat').value)  || 0,
  };
  if (!meals[mealDate]) meals[mealDate] = [];
  meals[mealDate].push(entry);
  saveMeals();
  closeSheet('mealSheet');
  render();
}

function delMeal(ds, idx) {
  meals[ds].splice(idx, 1);
  saveMeals(); render();
}

document.getElementById('mName').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveMeal();
});

// ─── FAVORITES ────────────────────────────────────────────────────────────────
let favs = JSON.parse(localStorage.getItem('dalys2_favs') || '[]');
const saveFavs = () => localStorage.setItem('dalys2_favs', JSON.stringify(favs));

function favKey(m) { return m.name + '|' + m.kcal; }
function isFav(m) { return favs.some(f => favKey(f) === favKey(m)); }

function toggleFav(mJson) {
  const m = JSON.parse(mJson);
  const k = favKey(m);
  const idx = favs.findIndex(f => favKey(f) === k);
  if (idx >= 0) favs.splice(idx, 1);
  else favs.push({ name: m.name, kcal: m.kcal, prot: m.prot, carb: m.carb, fat: m.fat });
  saveFavs();
  render();
}

function delFav(idx) {
  favs.splice(idx, 1);
  saveFavs();
  renderFavSection();
}

function addFavToDay(idx) {
  const f = favs[idx];
  if (!meals[mealDate]) meals[mealDate] = [];
  meals[mealDate].push({ ...f });
  saveMeals();
  closeSheet('mealSheet');
  render();
}

function renderFavSection() {
  const el = document.getElementById('favSection');
  if (!el) return;
  if (!favs.length) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="fav-label">⭐ Favoriten</div>
    <div class="fav-list">
      ${favs.map((f,i) => `
        <div class="fav-item" onclick="addFavToDay(${i})">
          <div class="fav-item-info">
            <div class="fav-item-name">${esc(f.name)}</div>
            <div class="fav-item-macros">P ${f.prot||0}g · K ${f.carb||0}g · F ${f.fat||0}g</div>
          </div>
          <span class="fav-item-kcal">${f.kcal||0} kcal</span>
          <button class="fav-del-btn" onclick="event.stopPropagation();delFav(${i})">✕</button>
        </div>`).join('')}
    </div>
    <div style="height:1px;background:var(--border);margin:16px 0"></div>`;
}

// ─── BARCODE SCANNER ──────────────────────────────────────────────────────────
let scanner = null;
let scannedProduct = null;

function startScanner() {
  closeSheet('mealSheet');
  document.getElementById('scanOverlay').classList.add('open');

  scanner = new Html5Qrcode('scanView');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 130 }, aspectRatio: window.innerHeight / window.innerWidth },
    (barcode) => onBarcode(barcode),
    () => {}
  ).catch(err => {
    alert('Kamera konnte nicht gestartet werden. Bitte Kamera-Zugriff erlauben.');
    closeScanner();
  });
}

function closeScanner() {
  document.getElementById('scanOverlay').classList.remove('open');
  if (scanner) {
    scanner.stop().catch(()=>{}).finally(() => { scanner = null; });
  }
}

async function onBarcode(barcode) {
  closeScanner();

  // Show loading state
  scannedProduct = null;

  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const data = await res.json();

    if (data.status !== 1 || !data.product) {
      alert('Produkt nicht gefunden. Bitte manuell eintragen.');
      openMeal(mealDate);
      return;
    }

    const p = data.product;
    const n = p.nutriments || {};

    scannedProduct = {
      name: p.product_name_de || p.product_name || p.product_name_en || 'Unbekanntes Produkt',
      kcal100: Math.round(n['energy-kcal_100g'] || n['energy_100g'] / 4.184 || 0),
      prot100: Math.round((n['proteins_100g'] || 0) * 10) / 10,
      carb100: Math.round((n['carbohydrates_100g'] || 0) * 10) / 10,
      fat100:  Math.round((n['fat_100g'] || 0) * 10) / 10,
    };

    showProductConfirm();
  } catch (e) {
    alert('Fehler beim Abrufen der Produktdaten. Bitte Internetverbindung prüfen.');
    openMeal(mealDate);
  }
}

function showProductConfirm() {
  const p = scannedProduct;
  document.getElementById('prodName').textContent = p.name;
  document.getElementById('prodPer100').textContent = `Pro 100 g`;
  document.getElementById('prodPreview').innerHTML = `
    <div class="pmp"><div class="pmp-val">${p.kcal100}</div><div class="pmp-lbl">kcal</div></div>
    <div class="pmp"><div class="pmp-val">${p.prot100}g</div><div class="pmp-lbl">Protein</div></div>
    <div class="pmp"><div class="pmp-val">${p.carb100}g</div><div class="pmp-lbl">Kohlenh.</div></div>
    <div class="pmp"><div class="pmp-val">${p.fat100}g</div><div class="pmp-lbl">Fett</div></div>
  `;
  document.getElementById('gramInput').value = '100';
  document.getElementById('prodConfirm').classList.add('open');
  setTimeout(() => document.getElementById('gramInput').focus(), 200);
}

function confirmProduct() {
  const grams = parseFloat(document.getElementById('gramInput').value) || 100;
  const p = scannedProduct;
  const factor = grams / 100;

  if (!meals[mealDate]) meals[mealDate] = [];
  meals[mealDate].push({
    name: `${p.name} (${grams}g)`,
    kcal: Math.round(p.kcal100 * factor),
    prot: Math.round(p.prot100 * factor * 10) / 10,
    carb: Math.round(p.carb100 * factor * 10) / 10,
    fat:  Math.round(p.fat100  * factor * 10) / 10,
  });

  saveMeals();
  document.getElementById('prodConfirm').classList.remove('open');
  scannedProduct = null;
  render();
}

function cancelProduct() {
  document.getElementById('prodConfirm').classList.remove('open');
  scannedProduct = null;
  openMeal(mealDate);
}

document.getElementById('gramInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmProduct();
});

// ─── GOALS MODAL ──────────────────────────────────────────────────────────────
function openGoals() {
  document.getElementById('gKcal').value = nutGoals.kcal;
  document.getElementById('gProt').value = nutGoals.prot;
  document.getElementById('gCarb').value = nutGoals.carb;

}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
async function askNotif() {
  if (!('Notification' in window)) { alert('Nicht unterstützt.'); return; }
  const p = await Notification.requestPermission();
  if (p === 'granted') {
    document.getElementById('notifBar').style.display = 'none';
    new Notification("Daily's", { body: 'Mitteilungen aktiviert ✓' });
  }
}

function scheduleNotif(title, time, date) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const target = new Date(date + 'T' + time);
  const delay = target - Date.now();
  if (delay > 0 && delay < 7 * 86400000) {
    setTimeout(() => {
      new Notification("Daily's", { body: title });
    }, delay);
  }
}

function checkNotifBanner() {
  if ('Notification' in window && Notification.permission === 'default') {
    document.getElementById('notifBar').style.display = 'block';
  }
}

// ─── CELEBRATION ──────────────────────────────────────────────────────────────
function celebrate() {
  const msg = document.getElementById('celebrateMsg');
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 2800);

  const canvas = document.getElementById('celebrationCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const pieces = [];
  const colors = ['#fff','#aaa','#666','#ddd','#f0f0f0','#ffffff'];

  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 200,
      w: 6 + Math.random() * 8,
      h: 4 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      vr: (Math.random() - 0.5) * 0.2,
      opacity: 1,
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      p.vy += 0.05;
      if (frame > 80) p.opacity -= 0.015;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 130) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ─── SERVICE WORKER (Offline + PWA) ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `
    const V = 'dalys-v2';
    self.addEventListener('install', e =>
      e.waitUntil(caches.open(V).then(c => c.addAll([self.location.pathname])))
    );
    self.addEventListener('fetch', e =>
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)))
    );
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
checkNotifBanner();
render();
</script>
